<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Settings - AEP Admin</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-header">
  <div class="header-top">
    <a href="/admin" style="color:white;font-size:20px;text-decoration:none">←</a>
    <div class="app-logo"><span class="logo-aep">⚙️</span></div>
    <div></div>
  </div>
  <div class="user-name">App Settings</div>
  <div style="font-size:12px;opacity:0.65">Super Admin Only</div>
</div>

<div style="padding:16px;padding-bottom:40px">
  {% if success_msg %}
  <div class="alert alert-success">✅ {{ success_msg }}</div>
  {% endif %}

  <form method="POST" action="/admin/settings">
    <div class="card">
      <div style="font-size:13px;font-weight:800;margin-bottom:14px;color:var(--muted);text-transform:uppercase">📱 App Info</div>
      <div class="form-group">
        <label class="form-label">App Name</label>
        <input type="text" name="app_name" class="form-control" value="{{ settings.app_name }}">
      </div>
    </div>

    <div class="card">
      <div style="font-size:13px;font-weight:800;margin-bottom:14px;color:var(--muted);text-transform:uppercase">📝 Exam Settings</div>
      <div class="form-group">
        <label class="form-label">Exam Duration (minutes)</label>
        <input type="number" name="exam_duration" class="form-control" value="{{ settings.exam_duration_minutes }}" min="10" max="180">
      </div>
      <div class="form-group">
        <label class="form-label">Questions per Exam</label>
        <input type="number" name="exam_questions" class="form-control" value="{{ settings.exam_questions }}" min="5" max="100">
      </div>
    </div>

    <div class="card">
      <div style="font-size:13px;font-weight:800;margin-bottom:14px;color:var(--muted);text-transform:uppercase">🔧 System</div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:14px;font-weight:700">Allow Registration</div>
          <div style="font-size:12px;color:var(--muted)">New students can register</div>
        </div>
        <label style="position:relative;display:inline-block;width:50px;height:26px">
          <input type="checkbox" name="allow_reg" {{ 'checked' if settings.allow_registration else '' }} style="opacity:0;width:0;height:0">
          <span style="position:absolute;cursor:pointer;inset:0;background:{{ 'var(--green)' if settings.allow_registration else '#ccc' }};border-radius:26px;transition:0.3s"></span>
        </label>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0">
        <div>
          <div style="font-size:14px;font-weight:700">Maintenance Mode</div>
          <div style="font-size:12px;color:var(--muted)">Block all student access</div>
        </div>
        <label style="position:relative;display:inline-block;width:50px;height:26px">
          <input type="checkbox" name="maintenance" {{ 'checked' if settings.maintenance_mode else '' }} style="opacity:0;width:0;height:0">
          <span style="position:absolute;cursor:pointer;inset:0;background:{{ 'var(--red)' if settings.maintenance_mode else '#ccc' }};border-radius:26px;transition:0.3s"></span>
        </label>
      </div>
    </div>

    <button type="submit" class="btn btn-primary">💾 Save Settings</button>
  </form>

  <div class="card" style="margin-top:12px">
    <div style="font-size:13px;font-weight:800;margin-bottom:14px;color:var(--muted);text-transform:uppercase">🔑 Admin Credentials</div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px;color:var(--muted);font-weight:600">Email</span>
      <span style="font-size:13px;font-weight:700">admin@ahmerdee.com</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0">
      <span style="font-size:13px;color:var(--muted);font-weight:600">Role</span>
      <span style="font-size:13px;font-weight:700;color:var(--gold)">Super Admin (Founder)</span>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/static/js/app.js"></script>
</body>
</html>
