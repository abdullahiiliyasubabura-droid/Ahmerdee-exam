<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reports - AEP Admin</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-header">
  <div class="header-top">
    <a href="/admin" style="color:white;font-size:20px;text-decoration:none">←</a>
    <div class="app-logo"><span class="logo-aep">⚠️</span></div>
    <div></div>
  </div>
  <div class="user-name">User Reports</div>
  <div style="font-size:12px;opacity:0.65">{{ reports|length }} total reports</div>
</div>

<div style="padding:12px 16px 40px">
  {% for r in reports %}
  <div class="admin-card">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:10px;font-weight:800;color:var(--accent);text-transform:uppercase">{{ r.status }}</span>
      <span style="font-size:11px;color:var(--muted);font-weight:600">{{ r.date[:10] }}</span>
    </div>
    <div style="font-size:13px;font-weight:700;margin-bottom:4px">Reported: <span style="color:var(--red)">{{ r.target_name }}</span></div>
    <div style="font-size:13px;color:var(--muted);font-weight:600;margin-bottom:4px">By: {{ r.reporter_name }}</div>
    <div style="font-size:13px;font-weight:600;margin-bottom:12px;padding:8px;background:var(--bg);border-radius:8px">{{ r.reason }}</div>
    <div style="display:flex;gap:8px">
      <a href="/admin/user/{{ r.target_id }}" class="btn btn-outline btn-sm" style="text-decoration:none">👤 View User</a>
    </div>
  </div>
  {% endfor %}
  {% if not reports %}
  <div style="text-align:center;padding:40px;color:var(--muted)">No reports yet.</div>
  {% endif %}
</div>

<div id="toast-container" class="toast-container"></div>
<script src="/static/js/app.js"></script>
</body>
</html>
